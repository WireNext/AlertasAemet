<!DOCTYPE html>
<html lang="es">
<head>
    <title>Avisos AEMET</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Base Dark Mode */
        #map { height: 100vh; width: 100%; margin: 0; z-index: 1; background-color: #0b0e14; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            background-color: #0b0e14;
        }

        /* Selector de Días - Liquid Glass Dark */
        .selector-dias {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(28, 28, 30, 0.6); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 6px; border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex; gap: 4px;
        }

        button { 
            padding: 10px 22px; border: none; background: transparent; 
            color: #ebebf5; cursor: pointer; border-radius: 25px; 
            font-size: 13px; font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button.active { 
            background: rgba(255, 255, 255, 0.15); 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Modal Centrado - Liquid Glass Dark */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 2000;
            left: 0; top: 0; 
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            align-items: center; 
            justify-content: center;
        }

        .modal-content {
            background: rgba(30, 30, 32, 0.75);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 90%; 
            max-width: 450px; 
            max-height: 75vh; 
            border-radius: 35px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: applePop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.15);
        }

        /* Zona de contenido con Scroll Dark */
        .modal-body {
            padding: 30px;
            overflow-y: auto;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Scrollbar personalizada para Dark Mode */
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        @keyframes applePop {
            from { opacity: 0; transform: scale(0.92) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .close-btn { 
            position: absolute; top: 18px; right: 22px;
            font-size: 24px; color: #98989d; cursor: pointer; z-index: 10;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }

        hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 15px 0; }
        h3 { margin-top: 0; font-size: 1.4rem; padding-right: 25px; letter-spacing: -0.02em; color: #fff; }

        /* Ajuste para el mapa en modo oscuro */
        .leaflet-container {
            background: #0b0e14 !important;
        }
    </style>
</head>
<body>

<div class="selector-dias">
    <button id="btn0" class="active" onclick="filtrarDia(0)">Avuí</button>
    <button id="btn1" onclick="filtrarDia(1)">Demà</button>
    <button id="btn2" onclick="filtrarDia(2)">Despús-demà</button>
</div>

<div id="miModal" class="modal" onclick="cerrarSiFuera(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="cerrarModal()">&times;</span>
        <div id="modalBody" class="modal-body">
            </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([40.4167, -3.7037], 6);

    // TileLayer con filtro oscuro vía CSS invertido para mejor estética dark
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    var capaAvisos = L.geoJSON(null, {
        style: function(f) {
            let colorFinal = f.properties.fillColor || '#ffff00'; 
            
            return {
                fillColor: colorFinal,
                weight: 1,
                opacity: 0.8,
                color: 'rgba(255,255,255,0.3)', // Borde sutil transparente
                fillOpacity: 0.5
            };
        },
        onEachFeature: function(f, l) {
            l.on('click', function() { abrirModal(f.properties.popup_html); });
        }
    }).addTo(map);

    var datosOriginales;
    fetch('avisos_espana.geojson').then(r => r.json()).then(data => {
        datosOriginales = data;
        filtrarDia(0);
    });

    function filtrarDia(diaNum) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + diaNum).classList.add('active');
        
        capaAvisos.clearLayers();
        if(!datosOriginales) return;

        var avisosDelDia = datosOriginales.features.filter(f => parseInt(f.properties.dia) === diaNum);
        avisosDelDia.sort((a, b) => (a.properties.priority || 0) - (b.properties.priority || 0));
        capaAvisos.addData(avisosDelDia);
    }

    function abrirModal(contenido) {
        document.getElementById('modalBody').innerHTML = contenido;
        document.getElementById('miModal').style.display = "flex";
    }

    function cerrarModal() {
        document.getElementById('miModal').style.display = "none";
    }

    function cerrarSiFuera(event) {
        if (event.target.id === "miModal") cerrarModal();
    }
</script>
</body>
</html>
