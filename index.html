<!DOCTYPE html>
<html lang="es">
<head>
    <title>Avisos AEMET - Liquid Glass</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Estilos Base */
        #map { height: 100vh; width: 100%; margin: 0; z-index: 1; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            background-color: #f2f2f7;
        }

        /* Selector de Días */
        .selector-dias {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 5px; border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex; gap: 4px;
        }

        button { 
            padding: 8px 18px; border: none; background: transparent; 
            color: #1d1d1f; cursor: pointer; border-radius: 20px; 
            font-size: 13px; font-weight: 500;
            transition: all 0.2s ease;
        }

        button.active { 
            background: #ffffff; color: #007AFF; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-weight: 600;
        }

        /* Modal Rediseñado (Liquid Glass + Scroll) */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            margin: auto;
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 90%; max-width: 480px; 
            max-height: 80vh; /* No ocupa más del 80% de la pantalla */
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            animation: appleSpring 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative; top: 50%; transform: translateY(-50%);
        }

        /* Contenedor con Scroll dentro del modal */
        .modal-scroll-area {
            padding: 25px;
            overflow-y: auto; /* Permite scroll vertical */
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.2) transparent;
        }

        .modal-scroll-area::-webkit-scrollbar { width: 6px; }
        .modal-scroll-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        @keyframes appleSpring {
            from { opacity: 0; transform: translateY(-40%) scale(0.95); }
            to { opacity: 1; transform: translateY(-50%) scale(1); }
        }

        .close-btn { 
            position: absolute; right: 20px; top: 15px;
            font-size: 24px; color: #86868b; cursor: pointer; z-index: 10;
        }

        hr { border: 0; height: 1px; background: rgba(0,0,0,0.08); margin: 15px 0; }
        h3 { margin-top: 0; font-size: 1.25rem; padding-right: 20px; line-height: 1.2; }
    </style>
</head>
<body>

<div class="selector-dias">
    <button id="btn0" class="active" onclick="filtrarDia(0)">Hoy</button>
    <button id="btn1" onclick="filtrarDia(1)">Mañana</button>
    <button id="btn2" onclick="filtrarDia(2)">Pasado</button>
</div>

<div id="miModal" class="modal" onclick="cerrarModalExterno(event)">
    <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">&times;</span>
        <div id="modalBody" class="modal-scroll-area">
            </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([40.4167, -3.7037], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var capaAvisos = L.geoJSON(null, {
        style: function(f) {
            // Ajuste de color amarillo para que no parezca naranja
            let colorOriginal = f.properties.color || '#ffcc00';
            let colorFinal = (colorOriginal.toLowerCase() === '#f3f702' || colorOriginal.toLowerCase() === '#ffcc00') ? '#FFFF00' : colorOriginal;
            
            return {
                fillColor: colorFinal,
                weight: 1.5,
                opacity: 0.9,
                color: '#ffffff',
                fillOpacity: 0.6
            };
        },
        onEachFeature: function(f, l) {
            l.on('click', function() { abrirModal(f.properties.popup_html); });
        }
    }).addTo(map);

    var datosOriginales;

    fetch('avisos_espana.geojson')
        .then(r => r.json())
        .then(data => {
            datosOriginales = data;
            filtrarDia(0);
        });

    function filtrarDia(diaNum) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + diaNum).classList.add('active');
        
        capaAvisos.clearLayers();
        if(!datosOriginales) return;

        var filtrados = datosOriginales.features.filter(f => parseInt(f.properties.dia) === diaNum);
        filtrados.sort((a, b) => a.properties.priority - b.properties.priority);
        capaAvisos.addData(filtrados);

        capaAvisos.eachLayer(function(l) {
            if (l.feature.properties.priority === 3) l.bringToFront();
        });
    }

    function abrirModal(contenido) {
        document.getElementById('modalBody').innerHTML = contenido;
        document.getElementById('miModal').style.display = "flex";
    }

    function cerrarModal() {
        document.getElementById('miModal').style.display = "none";
    }

    function cerrarModalExterno(event) {
        if (event.target.id === "miModal") cerrarModal();
    }
</script>
</body>
</html>
