<!DOCTYPE html>
<html lang="es">
<head>
    <title>Avisos AEMET - Liquid Glass</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Base */
        #map { height: 100vh; width: 100%; margin: 0; z-index: 1; }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            background-color: #f2f2f7;
        }

        /* Selector de Días */
        .selector-dias {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 5px; border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex; gap: 4px;
        }

        button { 
            padding: 10px 20px; border: none; background: transparent; 
            color: #1d1d1f; cursor: pointer; border-radius: 20px; 
            font-size: 13px; font-weight: 500;
            transition: all 0.2s ease;
        }

        button.active { 
            background: #ffffff; color: #007AFF; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-weight: 600;
        }

        /* Modal Centrado - Liquid Glass */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 2000;
            left: 0; top: 0; 
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.3); /* Fondo oscurecido sutil */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            /* Centrado absoluto con Flexbox */
            display: none; /* Cambia a flex en JS */
            align-items: center; 
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%; 
            max-width: 450px; 
            max-height: 75vh; /* Evita que se salga de la pantalla */
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: applePop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.15);
        }

        /* Zona de contenido con Scroll */
        .modal-body {
            padding: 25px;
            overflow-y: auto;
            color: #1d1d1f;
            line-height: 1.5;
        }

        /* Estilo para el scroll interno */
        .modal-body::-webkit-scrollbar { width: 5px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        @keyframes applePop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .close-btn { 
            position: absolute; top: 15px; right: 20px;
            font-size: 24px; color: #8e8e93; cursor: pointer; z-index: 10;
        }
        .close-btn:hover { color: #000; }

        hr { border: 0; height: 1px; background: rgba(0,0,0,0.08); margin: 15px 0; }
        h3 { margin-top: 0; font-size: 1.3rem; padding-right: 25px; letter-spacing: -0.02em; }
    </style>
</head>
<body>

<div class="selector-dias">
    <button id="btn0" class="active" onclick="filtrarDia(0)">Hoy</button>
    <button id="btn1" onclick="filtrarDia(1)">Mañana</button>
    <button id="btn2" onclick="filtrarDia(2)">Pasado</button>
</div>

<div id="miModal" class="modal" onclick="cerrarSiFuera(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="cerrarModal()">&times;</span>
        <div id="modalBody" class="modal-body">
            </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([40.4167, -3.7037], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var capaAvisos = L.geoJSON(null, {
        style: function(f) {
            // Corrección de color Amarillo (vibrante)
            let c = f.properties.color || '#ffcc00';
            let colorFinal = (c.toLowerCase() === '#f3f702' || c.toLowerCase() === '#ffcc00') ? '#ffff00' : c;
            
            return {
                fillColor: colorFinal,
                weight: 1.5,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.6 // Más opacidad para que se vea el amarillo real
            };
        },
        onEachFeature: function(f, l) {
            l.on('click', function() { abrirModal(f.properties.popup_html); });
        }
    }).addTo(map);

    var datosOriginales;
    fetch('avisos_espana.geojson').then(r => r.json()).then(data => {
        datosOriginales = data;
        filtrarDia(0);
    });

    function filtrarDia(diaNum) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + diaNum).classList.add('active');
        
        capaAvisos.clearLayers();
        if(!datosOriginales) return;

        var filtrados = datosOriginales.features.filter(f => parseInt(f.properties.dia) === diaNum);
        filtrados.sort((a, b) => a.properties.priority - b.properties.priority);
        capaAvisos.addData(filtrados);

        capaAvisos.eachLayer(function(l) {
            if (l.feature.properties.priority === 3) l.bringToFront();
        });
    }

    function abrirModal(contenido) {
        document.getElementById('modalBody').innerHTML = contenido;
        // Forzamos display flex para centrar
        document.getElementById('miModal').style.display = "flex";
    }

    function cerrarModal() {
        document.getElementById('miModal').style.display = "none";
    }

    function cerrarSiFuera(event) {
        if (event.target.id === "miModal") cerrarModal();
    }
</script>
</body>
</html>
